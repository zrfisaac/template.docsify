			<!-- # : - docsify - configuracao -->
			window.$docsify = {
				name: 'ðŸ“š WIKI',
				auto2top: true,
				loadSidebar: false,
				maxLevel: 0,
				subMaxLevel: 3,
				search: {
					placeholder: 'Digite para pesquisar',
					noData: 'Nenhum resultado encontrado',
					depth: 2,
				},
				copyCode: {
					buttonText: 'ðŸ“‹',
					errorText: 'âŒ',
					successText: 'âœ…',
				},
				darklightTheme: {
				  defaultTheme: 'dark',
				  toggleTheme: false
				},
			};

			function normalizeWikiRoute() {
				return window.location.hash
					.replace(/^#\/?/, '')
					.replace(/[?#].*$/, '')
					.replace(/\/+$/, '');
			}

			function getParentWikiRoute(route) {
				const parts = route.split('/').filter(Boolean);

				if (parts.length === 0 || (parts.length === 1 && parts[0].toLowerCase() === 'readme')) {
					return '/';
				}

				if (parts[parts.length - 1].toLowerCase() === 'readme') {
					parts.pop();
					parts.pop();
				} else {
					parts.pop();
				}

				const target = parts.length === 0 ? 'README' : `${parts.join('/')}/README`;
				return `#/${target}`;
			}

			function updateFloatingBackLink() {
				const backLink = document.querySelector('.floating-back');
				if (!backLink) {
					return;
				}

				backLink.href = getParentWikiRoute(normalizeWikiRoute());
			}

			window.addEventListener('DOMContentLoaded', updateFloatingBackLink);
			window.addEventListener('hashchange', updateFloatingBackLink);
		</script>
